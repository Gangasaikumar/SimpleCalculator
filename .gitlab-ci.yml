image: node:latest

variables:
  GITHUB_REPO: "https://oauth2:${GITHUB_TOKEN}@github.com/Gangasaikumar/SimpleCalculator.git"
  WORKDIR: source

before_script:
  - echo "Cloning latest code..."
  - rm -rf $WORKDIR
  - git clone $GITHUB_REPO .
  - cd $WORKDIR
  - git checkout main
  - npm ci # ⭐ install deps here

stages:
  - test
  - build

lint_code:
  stage: test
  script:
    - npm run lint

unit_tests:
  stage: test
  script:
    - npm run test:coverage
  artifacts:
    when: always
    paths:
      - $WORKDIR/coverage/

build_project:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - $WORKDIR/dist/
