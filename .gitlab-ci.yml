image: node:latest

# Define cache to speed up jobs and keep logs clean
cache:
  key: "project-deps-cache"
  paths:
    - node_modules/

stages:
  - install
  - test
  - build

install_dependencies:
  stage: install
  script:
    - echo "Starting dependency installation..."
    - npm install --prefer-offline --no-audit
    - echo "Dependencies installed successfully."
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint_code:
  stage: test
  script:
    - echo "Running linter..."
    - npm run lint
    - echo "Linting completed."

unit_tests:
  stage: test
  script:
    - echo "Running tests with coverage and reports..."
    - npm run test:coverage
    - echo "Testing completed."
  coverage: '/Statements\s*:\s*(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 week

build_project:
  stage: build
  script:
    - echo "Starting build process..."
    - npm run build
    - echo "Build completed successfully."
  artifacts:
    paths:
      - dist/
