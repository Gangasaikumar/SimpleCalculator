image: node:latest

# Clone GitHub repo dynamically
variables:
  GITHUB_REPO: "https://oauth2:${GITHUB_TOKEN}@github.com/YOUR_USER/YOUR_REPO.git"
  WORKDIR: source

before_script:
  - echo "Cloning latest code from GitHub..."
  - rm -rf $WORKDIR
  - git clone $GITHUB_REPO $WORKDIR
  - cd $WORKDIR
  - git fetch --all
  - git checkout $CI_COMMIT_REF_NAME || git checkout main
  - echo "Latest commit:"
  - git log -1 --oneline

# Define cache to speed up jobs and keep logs clean
cache:
  key: "project-deps-cache"
  paths:
    - node_modules/

stages:
  - install
  - test
  - build

install_dependencies:
  stage: install
  script:
    - echo "Starting dependency installation..."
    - npm install --prefer-offline --no-audit
    - echo "Dependencies installed successfully."
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint_code:
  stage: test
  script:
    - echo "Running linter..."
    - npm run lint
    - echo "Linting completed."

unit_tests:
  stage: test
  script:
    - echo "Running tests with coverage and reports..."
    - npm run test:coverage
    - echo "Testing completed."
  coverage: '/Statements\s*:\s*(\d+(?:\.\d+)?)%/'
  artifacts:
    when: always
    paths:
      - coverage/
      - junit.xml
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 week

build_project:
  stage: build
  script:
    - echo "Starting build process..."
    - npm run build
    - echo "Build completed successfully."
  artifacts:
    paths:
      - dist/
